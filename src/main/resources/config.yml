# MegaPlugin 配置文件 v2.0

economy:
  enabled: true
  starting-balance: 100.0
  currency-symbol: "$"
  currency-singular: "元"
  currency-plural: "元"

teleport:
  request-timeout: 60
  back-on-death: true

chat:
  nick-color: "&7"

kits:
  cooldown-interval: 20

rtp:
  min-radius: 200
  max-radius: 20000
  cooldown: 30
  cost: 0

claim:
  max-claims: 5
  max-size: 64
  invite-timeout: 60

messages:
  prefix: "&8[&6Mega&ePlugin&8]&r"
  no-permission: "{prefix} &c你没有权限！"
  player-only: "{prefix} &c只有玩家可以使用此命令！"
  player-not-found: "{prefix} &c玩家未找到！"
  invalid-number: "{prefix} &c无效的数字！"
  config-reloaded: "{prefix} &a配置已重新加载！"
